<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hiroba News Smart Monitor v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { user-select:none; -webkit-user-select:none; }
a, input, textarea, [contenteditable] { user-select:text; -webkit-user-select:text; }

:root {
  --bg:          #0b0f14;
  --panel:       rgba(255,255,255,0.055);
  --panel-hover: rgba(255,255,255,0.085);
  --border:      rgba(255,255,255,0.10);
  --border-h:    rgba(255,255,255,0.22);
  --blur:        blur(18px);
  --text:        rgba(255,255,255,0.92);
  --soft:        rgba(255,255,255,0.55);
  --ghost:       rgba(255,255,255,0.28);
  --accent:      #5ec4ff;
  --accent-warm: #ffb347;
  --danger:      #ff4757;
  --danger-bg:   rgba(255,71,87,0.12);
  --danger-bdr:  rgba(255,71,87,0.40);
  --safe:        #2ed573;
  --ticker-h:    44px;
  --left-w:      310px;
  --dot-h:       28px;
}

html, body { width:100%; height:100dvh; overflow:hidden; background:var(--bg); }
body { font-family:'Noto Sans JP', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', 'Meiryo UI', sans-serif; color:var(--text); }

#bg-wrap { position:fixed; inset:0; z-index:0; }
.bg-s {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  opacity:0; transition:opacity 2s ease;
}
.bg-s.on { opacity:1; }
#bg-ov {
  position:fixed; inset:0; z-index:1;
  background:linear-gradient(135deg,rgba(0,0,0,0.62) 0%,rgba(0,0,0,0.38) 60%,rgba(0,0,0,0.55) 100%);
}

#pager-wrap {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
}

#ticker-bar {
  flex-shrink:0; height:var(--ticker-h);
  display:flex; align-items:center;
  background:rgba(0,0,0,0.50);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  overflow:hidden;
}
.ticker-label {
  flex-shrink:0; padding:0 14px;
  font-size:11px; font-weight:500; letter-spacing:2px;
  color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.08);
  height:100%; display:flex; align-items:center; border-right:1px solid var(--border);
}
.ticker-mask { flex:1; overflow:hidden; position:relative; }
.ticker-mask::before, .ticker-mask::after {
  content:''; position:absolute; top:0; bottom:0; width:32px; z-index:2; pointer-events:none;
}
.ticker-mask::before { left:0;  background:linear-gradient(to right,rgba(0,0,0,0.5),transparent); }
.ticker-mask::after  { right:0; background:linear-gradient(to left, rgba(0,0,0,0.5),transparent); }
#ticker-inner {
  display:flex; align-items:center; white-space:nowrap;
  animation:ticker 80s linear infinite;
}
#ticker-inner:hover { animation-play-state:paused; }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.ti { padding:0 18px; font-size:14px; color:rgba(255,255,255,0.85); border-right:1px solid rgba(255,255,255,0.12); pointer-events:none; user-select:none; }
.ti-sep { color:rgba(255,255,255,0.20); font-size:14px; padding:0 4px; }

#slides-viewport {
  flex:1; overflow:hidden; position:relative;
}
#slides-track {
  display:flex; height:100%; width:600%;
  transition:transform 0.38s cubic-bezier(0.4,0,0.2,1);
  will-change:transform;
}
.slide {
  flex:0 0 calc(100% / 6);
  height:100%; overflow:hidden;
  position:relative;
}

#page-dots {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  z-index:100; display:flex; gap:18px; align-items:center;
  background:rgba(0,0,0,0.50);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  padding:14px 30px; border-radius:36px;
  border:1px solid rgba(255,255,255,0.14);
}
.dot {
  width:22px; height:22px; border-radius:50%;
  background:rgba(255,255,255,0.28);
  transition:all 0.25s; cursor:pointer;
}
.dot.active { background:#fff; transform:scale(1.3); }

#page1 {
  display:grid;
  grid-template-columns: var(--left-w) 1fr;
  height:100%;
}

#left-col {
  grid-column:1;
  display:flex; flex-direction:column;
  border-right:1px solid var(--border);
  overflow:hidden;
}

#clock-block {
  flex-shrink:0; padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}
#time-display {
  font-size:clamp(72px,9vw,96px); font-weight:700; letter-spacing:2px; line-height:1; color:#fff;
}
#time-sep { opacity:0.3; }
#date-line { margin-top:8px; font-size:16px; font-weight:500; color:rgba(255,255,255,0.88); letter-spacing:0.5px; }
#reiwa-line { margin-top:4px; font-size:14px; font-weight:400; color:rgba(255,255,255,0.55); letter-spacing:1px; }
#city-line  { margin-top:10px; font-size:13px; letter-spacing:1px; color:rgba(255,255,255,0.40); }

#weather-now {
  flex-shrink:0; padding:14px 20px; border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.15);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
.wn-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.wn-icon { font-size:52px; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
.wn-temp { font-size:46px; font-weight:700; color:#fff; line-height:1; }
.wn-unit { font-size:18px; opacity:0.5; }
.wn-desc { font-size:16px; font-weight:500; color:rgba(255,255,255,0.85); margin-top:4px; }
.wn-feels { font-size:14px; color:rgba(255,255,255,0.50); }
.wn-stats { display:flex; gap:8px; }
.wn-stat  { flex:1; text-align:center; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:10px; padding:7px 4px; }
.wn-stat-l { font-size:11px; letter-spacing:0.5px; color:rgba(255,255,255,0.45); }
.wn-stat-v { font-size:20px; font-weight:700; color:#fff; margin-top:2px; }
.wn-stat-u { font-size:9px; opacity:0.5; }

#hourly-block { flex-shrink:0; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.10); }
#weekly-scroll { flex:1; overflow-y:auto; padding:10px 12px 16px; }
#weekly-scroll::-webkit-scrollbar { width:3px; }
#weekly-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }
.weekly-label { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--ghost); margin-bottom:8px; padding-left:4px; }

#hourly-strip { display:flex; gap:6px; overflow-x:auto; padding:0 12px 10px; cursor:grab; }
#hourly-strip::-webkit-scrollbar { height:2px; }
#hourly-strip::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); }
.hc { flex-shrink:0; text-align:center; min-width:56px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; padding:6px 4px; }
.hc-t  { font-size:12px; color:var(--ghost); }
.hc-i  { font-size:22px; margin:4px 0; }
.hc-tp { font-size:14px; font-weight:700; color:#fff; }

.fc-card { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; margin-bottom:5px; background:rgba(255,255,255,0.04); border:1px solid var(--border); transition:background 0.2s; }
.fc-card:hover { background:rgba(255,255,255,0.09); }
.fc-card.today { border-color:rgba(94,196,255,0.4); background:rgba(94,196,255,0.08); }
.fc-day  { width:52px; font-size:13px; color:var(--soft); }
.fc-day b { font-size:14px; color:#fff; display:block; }
.fc-ico  { font-size:26px; width:30px; text-align:center; }
.fc-d    { flex:1; font-size:13px; color:var(--soft); }
.fc-tp   { text-align:right; }
.fc-hi   { font-size:16px; font-weight:700; color:var(--accent-warm); }
.fc-lo   { font-size:15px; font-weight:500; color:#87ceeb; }
.fc-pp   { font-size:11px; color:var(--ghost); }

#right-col {
  grid-column:2; display:flex; flex-direction:column; overflow:hidden;
}
#forex-panel {
  flex-shrink:0; padding:10px 14px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.18);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
.forex-updated { font-size:10px; color:var(--ghost); opacity:0.7; }
.forex-cards { display:flex; gap:7px; }
.fx-card { flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; padding:8px 10px; min-width:0; }
.fx-pair { font-size:14px; letter-spacing:1px; color:rgba(255,255,255,0.75); margin-bottom:5px; font-weight:600; }
.fx-rate { font-size:20px; font-weight:700; color:#fff; line-height:1.1; }
.fx-rate span { font-size:11px; font-weight:400; opacity:0.5; margin-left:1px; }
.fx-change { font-size:12px; font-weight:600; margin-top:4px; }
.fx-change.up   { color:#2ed573; }
.fx-change.down { color:#ff4757; }
.fx-change.flat { color:var(--ghost); }
.fx-label { font-size:9px; color:var(--ghost); margin-top:2px; opacity:0.7; }

#news-scroll { flex:1; overflow-y:auto; padding:14px 14px 28px; }
#news-scroll::-webkit-scrollbar { width:3px; }
#news-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }
.news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:8px; }
.nc {
  background:var(--panel); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border:1px solid var(--border); border-radius:12px; padding:15px 16px;
  cursor:pointer; transition:background 0.2s,border-color 0.2s,transform 0.15s;
  border-left:3px solid transparent; display:flex; flex-direction:column;
}
.nc:hover { background:var(--panel-hover); border-color:var(--border-h); border-left-color:var(--accent); transform:translateY(-1px); }
.nc a { text-decoration:none; color:inherit; display:block; }
.nc-title { font-size:15px; font-weight:700; line-height:1.6; color:#fff; }
.nc:hover .nc-title { color:var(--accent); }
.nc-desc { font-size:13px; color:var(--soft); margin-top:6px; line-height:1.65; }
.nc-footer { margin-top:auto; padding-top:8px; display:flex; flex-direction:column; gap:4px; }
.nc-meta { font-size:11px; color:var(--ghost); margin-top:7px; }
.nc-desc:empty, .nc-meta:empty { display:none; }

#page2 {
  display:flex; flex-direction:column;
  height:100%; padding:0;
  background:rgba(0,0,0,0.10);
}

#p2-top {
  flex:0 0 auto;
  display:flex; align-items:stretch;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.30);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
}

#p2-clock {
  padding:28px 40px 24px;
  display:flex; flex-direction:column; justify-content:center;
  border-right:1px solid var(--border);
}
#p2-time {
  font-size:clamp(100px,14vw,160px);
  font-weight:700; letter-spacing:4px; line-height:1; color:#fff;
}
#p2-time-sep { opacity:0.25; }
#p2-sec {
  font-size:clamp(32px,4vw,52px);
  font-weight:300; opacity:0.35; letter-spacing:3px;
  margin-top:6px; text-align:right;
}
#p2-date { margin-top:14px; font-size:clamp(18px,2.2vw,26px); font-weight:500; color:rgba(255,255,255,0.85); letter-spacing:1px; }
#p2-reiwa { margin-top:6px; font-size:clamp(14px,1.6vw,20px); color:rgba(255,255,255,0.45); letter-spacing:2px; }
#p2-city  { margin-top:8px; font-size:15px; color:rgba(255,255,255,0.32); letter-spacing:1px; }

#p2-weather-now {
  flex:1; display:flex; flex-direction:column; justify-content:center;
  padding:0; gap:0; overflow:hidden; position:relative;
}

#p2-day-nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px 10px;
  flex-shrink:0; gap:12px;
}
.p2-nav-arr {
  background:rgba(255,255,255,0.07); border:1px solid var(--border);
  color:rgba(255,255,255,0.55);
  font-size:26px; cursor:pointer; padding:6px 14px; border-radius:10px;
  transition:color 0.2s, background 0.2s;
  user-select:none; -webkit-user-select:none; flex-shrink:0;
}
.p2-nav-arr:hover { color:#fff; background:rgba(255,255,255,0.14); }
.p2-nav-arr:disabled { opacity:0.15; cursor:default; }
#p2-day-tabs {
  display:flex; gap:8px; align-items:center;
  flex:1; overflow-x:auto; justify-content:center;
}
#p2-day-tabs::-webkit-scrollbar { display:none; }
.p2-day-tab {
  font-size:15px; font-weight:500;
  padding:8px 20px; border-radius:24px;
  border:1px solid var(--border); color:var(--soft);
  cursor:pointer; transition:all 0.2s; background:transparent;
  white-space:nowrap; flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.p2-tab-wd { font-size:12px; opacity:0.55; font-weight:400; }
.p2-day-tab.active {
  background:rgba(94,196,255,0.18); border-color:var(--accent); color:#fff;
  font-weight:700;
}

#p2-wx-viewport { flex:1; overflow:hidden; position:relative; }
#p2-wx-track {
  display:flex; height:100%;
  transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
  will-change:transform;
}
.p2-wx-card {
  flex:0 0 100%; height:100%;
  display:flex; flex-direction:column; justify-content:center;
  padding:16px 36px 20px; gap:16px;
}
.p2-wx-main { display:flex; align-items:center; gap:20px; }
.p2-wx-icon { font-size:clamp(64px,9vw,100px); filter:drop-shadow(0 4px 16px rgba(0,0,0,0.5)); }
.p2-wx-temp { font-size:clamp(70px,10vw,120px); font-weight:700; color:#fff; line-height:1; }
.p2-wx-unit { font-size:clamp(22px,2.8vw,34px); opacity:0.45; vertical-align:super; }
.p2-wx-right { display:flex; flex-direction:column; gap:6px; }
.p2-wx-desc  { font-size:clamp(18px,2.2vw,28px); font-weight:600; color:rgba(255,255,255,0.9); }
.p2-wx-sub   { font-size:clamp(13px,1.4vw,18px); color:rgba(255,255,255,0.42); }
.p2-wx-hilo  { display:flex; gap:16px; align-items:baseline; }
.p2-wx-hi    { font-size:clamp(28px,3.5vw,44px); font-weight:700; color:var(--accent-warm); }
.p2-wx-lo    { font-size:clamp(22px,2.8vw,36px); font-weight:500; color:#87ceeb; }
.p2-wx-pp    { font-size:clamp(14px,1.5vw,18px); color:var(--ghost); }
.p2-wx-stats { display:flex; gap:12px; }
.p2-wx-stat  { flex:1; background:rgba(255,255,255,0.07); border:1px solid var(--border); border-radius:12px; padding:12px 8px; text-align:center; }
.p2-wx-stat-l { font-size:12px; letter-spacing:1px; color:rgba(255,255,255,0.4); }
.p2-wx-stat-v { font-size:clamp(22px,3vw,36px); font-weight:700; color:#fff; margin-top:3px; }
.p2-wx-stat-u { font-size:10px; opacity:0.4; }

#p2-hourly {
  flex-shrink:0;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,0.20);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
.p2-hl { font-size:11px; letter-spacing:2.5px; color:var(--ghost); padding:12px 20px 6px; }
#p2-hourly-strip { display:flex; gap:12px; overflow-x:auto; padding:0 20px 18px; cursor:grab; }
#p2-hourly-strip::-webkit-scrollbar { height:2px; }
#p2-hourly-strip::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); }
.p2-hc {
  flex-shrink:0; text-align:center; min-width:90px;
  background:rgba(255,255,255,0.07); border:1px solid var(--border);
  border-radius:16px; padding:14px 10px;
}
.p2-hc-t  { font-size:14px; color:var(--ghost); letter-spacing:0.5px; }
.p2-hc-i  { font-size:38px; margin:8px 0; }
.p2-hc-tp { font-size:22px; font-weight:700; color:#fff; }

#page3 {
  height:100%; display:flex; overflow:hidden;
}

#p3-handle {
  flex:0 0 220px;
  display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-start;
  padding:28px 22px 28px;
  border-right:1px solid var(--border);
  background:rgba(0,0,0,0.28);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  gap:10px; text-align:left;
  cursor:grab; user-select:none;
  overflow:hidden;
}
#p3-handle:active { cursor:grabbing; }
#p3-handle-title {
  font-size:20px; font-weight:700; color:#fff; letter-spacing:1px;
}
#p3-handle-count {
  font-size:13px; color:var(--soft);
}
#p3-handle-sources {
  margin-top:6px; display:flex; flex-direction:column; gap:4px;
}
#p3-handle-sources span {
  font-size:11px; color:var(--ghost); line-height:1.5;
}

#p3-canvas {
  flex:1; height:100%;
  overflow-y:scroll; overflow-x:hidden;
  padding:20px 28px 56px;
  display:flex; flex-direction:column; gap:22px;
  -webkit-overflow-scrolling:touch;
}
#p3-canvas::-webkit-scrollbar { width:3px; }
#p3-canvas::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }
.nt {
  flex-shrink:0; width:100%;
  background:var(--panel);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px 36px;
  border-left:5px solid var(--accent);
}
.nt-src {
  font-size:11px; letter-spacing:2.5px; text-transform:uppercase;
  color:var(--accent); opacity:0.85; margin-bottom:12px;
}
.nt-title {
  font-size:22px; font-weight:700; line-height:1.55; color:#fff;
  margin-bottom:14px;
}
.nt-body {
  font-size:16px; color:var(--soft); line-height:1.9;
  margin-bottom:14px;
}
.nt-meta { font-size:12px; color:var(--ghost); }
.nt-link { margin-top:10px; }
.nt-link a {
  font-size:13px; color:var(--accent);
  text-decoration:none;
}
.nt-link a:hover { text-decoration:underline; }

#page4 {
  height:100%; display:flex; overflow:hidden;
}

#mu-left {
  flex:0 0 360px; min-width:300px;
  display:flex; flex-direction:column; align-items:center;
  padding:28px 24px 24px;
  border-right:1px solid var(--border);
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  overflow-y:auto;
  gap:16px;
}
#mu-left::-webkit-scrollbar { display:none; }

#mu-art {
  width:180px; height:180px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:72px;
  flex-shrink:0;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

#mu-title {
  font-size:16px; font-weight:700; color:#fff;
  text-align:center; line-height:1.5;
  max-width:100%; word-break:break-all;
}
#mu-artist { font-size:13px; color:var(--ghost); text-align:center; }

#mu-seek-wrap {
  width:100%; display:flex; align-items:center; gap:10px;
}
#mu-seek-wrap > span { font-size:12px; color:var(--ghost); flex-shrink:0; min-width:36px; }
#mu-cur { text-align:right; }
#mu-seek-track {
  flex:1; height:8px; border-radius:4px;
  background:rgba(255,255,255,0.15);
  position:relative; cursor:pointer;
  touch-action:none;
}

#mu-seek-track::before {
  content:''; position:absolute;
  inset:-10px 0;
}
#mu-seek-fill {
  height:100%; border-radius:4px;
  background:var(--accent); width:0%;
  pointer-events:none;
}
#mu-seek-thumb {
  position:absolute; top:50%; transform:translate(-50%,-50%);
  width:22px; height:22px; border-radius:50%;
  background:#fff; left:0%;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
  pointer-events:none;
}

#mu-controls {
  display:flex; align-items:center; gap:16px;

}
#mu-scope-chk:checked {
  background:var(--accent); border-color:var(--accent);
}

  content:''; position:absolute;
  left:4px; top:1px; width:5px; height:9px;
  border:2px solid #000; border-top:none; border-left:none;

  flex-shrink:0;

#mu-vol-track {
  flex:1; height:8px; border-radius:4px;
  background:rgba(255,255,255,0.15);
  position:relative; cursor:pointer;
  touch-action:none;
}
#mu-vol-track::before {
  content:''; position:absolute;
  inset:-10px 0;
}
#mu-vol-fill {
  height:100%; border-radius:4px;
  background:rgba(255,255,255,0.7); width:80%;
  pointer-events:none;
}
#mu-vol-thumb {
  position:absolute; top:50%; transform:translate(-50%,-50%);

#mu-right {

<script>
'use strict';

const track  = document.getElementById('slides-track');
const dots   = document.querySelectorAll('.dot');
let curPage  = 0;
const PAGES  = 6;

function goPage(n, animate = true) {
  n = Math.max(0, Math.min(PAGES - 1, n));
  const px = -n * document.getElementById('slides-viewport').offsetWidth;
  if (!animate) {
    track.style.transition = 'none';
    track.style.transform  = `translateX(${px}px)`;
    requestAnimationFrame(() => { track.style.transition = ''; });
  } else {
    track.style.transform = `translateX(${px}px)`;
  }
  curPage = n;
  dots.forEach((d, i) => d.classList.toggle('active', i === n));

  if (n === 5) {
    setTimeout(() => location.reload(), 500);
  }
}

dots.forEach(d => d.addEventListener('click', () => goPage(+d.dataset.page)));

(function() {
  const vp = document.getElementById('slides-viewport');

  function pageW() { return vp.offsetWidth; }
  function setX(px) { track.style.transform = `translateX(${px}px)`; }
  function baseX() { return -curPage * pageW(); }

  let sx = 0, sy = 0;
  let startX = 0;
  let isHoriz = null;
  let active = false;

  function onDown(e) {
    const pt = e.touches ? e.touches[0] : e;
    sx = pt.clientX; sy = pt.clientY;
    isHoriz = null;
    startX = baseX();

    const SCROLL_IDS = [
      'weekly-scroll',    // PAGE1 週間予報（縦）
      'news-scroll',      // PAGE1 ニュース（縦）
      'hourly-strip',     // PAGE1 時間別（横）
      'p2-hourly-strip',  // PAGE2 時間別（横）
      'p2-wx-viewport',   // PAGE2 天気スワイプ（横・独自処理）
      'mu-seek-track',    // PAGE4 シークバー（独自処理）
      'mu-vol-track',     // PAGE4 音量バー（独自処理）
      'p3-canvas',        // PAGE3 ニュースタイル（縦）
      'mu-tree',          // PAGE4 音楽ツリー（縦）
      'cmd-list',         // PAGE5 コマンドリスト（縦）
      // ※ p3-handle・cmd-handle は除外しない（ページスワイプに使う）
    ];
    const inScrollEl = SCROLL_IDS.some(id => {
      const el = document.getElementById(id);
      return el && el.contains(e.target);
    });

    if (inScrollEl) {
      active = false;
      return;
    }
    active = true;
    track.style.transition = 'none';
  }

  function onMove(e) {
    if (!active) return;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - sx;
    const dy = pt.clientY - sy;

    if (isHoriz === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
      isHoriz = Math.abs(dx) > Math.abs(dy);
      if (isHoriz) track.style.transition = 'none';
    }
    if (isHoriz === null) return;
    if (!isHoriz) return;
    if (e.cancelable) e.preventDefault();

    let nx = startX + dx;
    const minX = -(PAGES - 1) * pageW();
    if (nx > 0)    nx = dx * 0.25;
    if (nx < minX) nx = minX + (nx - minX) * 0.25;
    setX(nx);
  }

  function onUp(e) {
    if (!active) return;
    active = false;
    track.style.transition = '';
    if (!isHoriz) return;

    const pt = e.changedTouches ? e.changedTouches[0] : e;
    const dx = pt.clientX - sx;
    const w  = pageW();
    const rawX   = startX + dx;
    const nearest = Math.round(-rawX / w);
    const flick   = Math.abs(dx) > 50;
    let target = nearest;
    if (flick && dx < 0) target = Math.max(nearest, curPage + 1);
    if (flick && dx > 0) target = Math.min(nearest, curPage - 1);
    goPage(target);
  }

  let mouseDown = false;
  vp.addEventListener('mousedown', e => { onDown(e); mouseDown = true; });

let wxSwipeSetup = false;
function setupWxSwipe() {
  if (wxSwipeSetup) return;
  wxSwipeSetup = true;
  const vp    = document.getElementById('p2-wx-viewport');
  const wxTrk = document.getElementById('p2-wx-track');
  let sx = 0, sy = 0, basePct = 0, active = false, isH = null;

  function numDays() { return wxForecast.length || 1; }
  function pctPerSlide() { return 100 / numDays(); }
  function wxBasePct() { return -wxDayIdx * pctPerSlide(); }

  function down(e) {
    const pt = e.touches ? e.touches[0] : e;
    sx = pt.clientX; sy = pt.clientY;
    basePct = wxBasePct();
    active = true; isH = null;
    wxTrk.style.transition = 'none';
  }
  function move(e) {
    if (!active) return;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - sx, dy = pt.clientY - sy;
    if (isH === null && (Math.abs(dx)>6||Math.abs(dy)>6)) isH = Math.abs(dx) > Math.abs(dy);
    if (!isH) return;
    if (e.cancelable) e.preventDefault();

    // pxをvp幅に対する%に変換
    const vpW = vp.offsetWidth || window.innerWidth;
    const dxPct = dx / vpW * pctPerSlide();
    let nx = basePct + dxPct;
    const minPct = -(numDays() - 1) * pctPerSlide();
    if (nx > 0)       nx = dxPct * 0.25;
    if (nx < minPct)  nx = minPct + (nx - minPct) * 0.25;
    wxTrk.style.transform = `translateX(${nx}%)`;
  }
  function up(e) {
    wxTrk.style.transition = '';
    if (!active || !isH) { active=false; return; }
    active = false;
    const pt = e.changedTouches ? e.changedTouches[0] : e;
    const dx = pt.clientX - sx;
    const vpW = vp.offsetWidth || window.innerWidth;
    const dxPct = dx / vpW * pctPerSlide();
    const rawPct  = basePct + dxPct;
    const nearest = Math.round(-rawPct / pctPerSlide());
    const flick   = Math.abs(dx) > 40;
    let target = nearest;
    if (flick && dx < 0) target = Math.max(nearest, wxDayIdx + 1);
    if (flick && dx > 0) target = Math.min(nearest, wxDayIdx - 1);
    renderP2Day(Math.max(0, Math.min(numDays() - 1, target)));
  }
  let md = false;
  vp.addEventListener('mousedown',  e => { down(e); md=true; });
  window.addEventListener('mousemove', e => { if(md) move(e); });
  window.addEventListener('mouseup',   e => { if(!md) return; md=false; up(e); });
  vp.addEventListener('touchstart', down, {passive:true});
  vp.addEventListener('touchmove',  move, {passive:false});
  vp.addEventListener('touchend',   up);
}

const FX_PAIRS = [
  { base:'usd', label:'USD/JPY 米ドル/日本円' },
  { base:'eur', label:'EUR/JPY ユーロ/日本円' },
  { base:'cny', label:'CNY/JPY 人民元/日本円' },
];
let fxData = {};

function isoDate(offsetDays=0) {
  const d = new Date(); d.setDate(d.getDate()+offsetDays);
  return d.toISOString().slice(0,10);
}
async function fetchRate(dateStr, base) {
  const urls = [
    `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${dateStr}/v1/currencies/${base}.min.json`,
    `https://${dateStr}.currency-api.pages.dev/v1/currencies/${base}.min.json`,
  ];
  for (const url of urls) {
    try {
      const r = await fetch(url); if (!r.ok) continue;
      const j = await r.json(); return j[base]['jpy'];
    } catch {}
  }
  return null;
}
async function loadForex() {
  const yday = isoDate(-1), wk = isoDate(-7);
  try {
    const bases = FX_PAIRS.map(p => p.base);
    const [lt, yd, wkd] = await Promise.all([
      Promise.all(bases.map(b => fetchRate('latest', b))),
      Promise.all(bases.map(b => fetchRate(yday, b))),
      Promise.all(bases.map(b => fetchRate(wk, b))),
    ]);
    fxData = { latest:{}, prev1d:{}, prev1w:{} };
    bases.forEach((b,i) => { fxData.latest[b]=lt[i]; fxData.prev1d[b]=yd[i]; fxData.prev1w[b]=wkd[i]; });
    const now = new Date();
    document.getElementById('forex-updated').textContent =
      `最終更新 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    renderForex();
  } catch(e) {
    document.getElementById('forex-cards').innerHTML =
      `<div class="loader" style="padding:8px;width:100%">取得失敗: ${h(e.message)}</div>`;
  }
}
function renderForex() {
  if (!fxData.latest) return;
  const prev = fxData.prev1w;
  const html = FX_PAIRS.map(p => {
    const cur = fxData.latest[p.base];
    const old = prev[p.base];
    if (cur == null) return `<div class="fx-card"><div class="fx-pair">${p.label}</div><div class="fx-rate">—</div></div>`;
    const diff = old != null ? cur - old : null;
    const pct  = old != null && old !== 0 ? diff / old * 100 : null;
    const sign = diff > 0 ? '+' : '';
    const cls  = diff == null ? 'flat' : diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
    const arrow= diff == null ? '─' : diff > 0 ? '▲' : diff < 0 ? '▼' : '─';
    const chg  = diff != null
      ? `<div class="fx-change ${cls}">${arrow} ${sign}${diff.toFixed(2)} (${sign}${pct.toFixed(2)}%)</div>`
      : `<div class="fx-change flat">─</div>`;
    return `<div class="fx-card">
      <div class="fx-pair">${p.label}</div>
      <div class="fx-rate">${cur.toFixed(2)}<span>円</span></div>
      ${chg}
      <div class="fx-label">前週比</div>
    </div>`;
  }).join('');
  document.getElementById('forex-cards').innerHTML = html;
}

function enableDragScroll(el, mode) {
  let sY=0, sX=0, scY=0, scX=0, drag=false, isH=null;

  function onDown(e) {
    drag=true; isH=null;
    const t = e.touches ? e.touches[0] : e;
    sY=t.clientY; sX=t.clientX;
    scY=el.scrollTop; scX=el.scrollLeft;
    el.classList.add('dragging');
    if (e.type==='mousedown') e.preventDefault();
  }
  function onMove(e) {
    if (!drag) return;
    const t = e.touches ? e.touches[0] : e;
    const dy = t.clientY - sY, dx = t.clientX - sX;

    if (isH === null && (Math.abs(dx)>4 || Math.abs(dy)>4)) {
      if      (mode === 'horizontal') isH = true;
      else if (mode === 'vertical')   isH = false;
      else                            isH = Math.abs(dx) > Math.abs(dy);
    }
    if (isH === null) return;
    if (isH && mode !== 'vertical')   el.scrollLeft = scX - dx;
    if (!isH && mode !== 'horizontal') el.scrollTop = scY - dy;
    if (!isH && e.cancelable) e.preventDefault();
  }
  function onUp() { drag=false; isH=null; el.classList.remove('dragging'); }

  el.addEventListener('mousedown',  onDown, { passive:false });
  el.addEventListener('mousemove',  onMove);
  el.addEventListener('mouseup',    onUp);
  el.addEventListener('mouseleave', onUp);
  el.addEventListener('touchstart', onDown, { passive:true });
  el.addEventListener('touchmove',  onMove, { passive:false });
  el.addEventListener('touchend',   onUp);
}

let muFiles   = [];     // フラット化した全ファイルリスト
let muIdx     = -1;     // 現在のインデックス

// ── スコープ限定ユーティリティ ──
function muScopeDir() {
  // チェックON かつ 曲が選択されているとき、親フォルダパスを返す
  if (!document.getElementById('mu-scope-chk').checked) return null;
  if (muIdx < 0) return null;
  const f = muFiles[muIdx];
  // path = "a/b/song.mp3" → dir = "a/b"
  const parts = f.path.split('/');
  parts.pop();
  return parts.join('/'); // ルート直下なら ""
}

function muScopedFiles() {
  const dir = muScopeDir();
  if (dir === null) return muFiles;
  // dir が "" → ルート直下のファイルのみ、それ以外 → dir/ で始まるもの
  return muFiles.filter(f => {
    const parts = f.path.split('/');
    parts.pop();
    const fdir = parts.join('/');
    // fdir が dir と一致、または dir の子孫であること
    return fdir === dir || fdir.startsWith(dir + '/');
  });
}

function muScopedIdx(globalIdx) {
  // globalIdx (muFiles上) を muScopedFiles() 上のインデックスに変換
  const scoped = muScopedFiles();
  return scoped.findIndex(f => f.path === muFiles[globalIdx]?.path);
}

function muGlobalIdx(scopedIdx) {
  // muScopedFiles() 上のインデックスを muFiles 上のインデックスに変換
  const scoped = muScopedFiles();
  const f = scoped[scopedIdx];
  if (!f) return -1;
  return muFiles.findIndex(mf => mf.path === f.path);
}

function muUpdateScopeLabel() {
  const chk = document.getElementById('mu-scope-chk');
  const lbl = document.getElementById('mu-scope-label');
  if (!chk.checked || muIdx < 0) {
    lbl.textContent = 'フォルダを限定しない';
    return;
  }
  const f = muFiles[muIdx];
  const parts = f.path.split('/');
  parts.pop();
  const dir = parts.join('/');
  lbl.textContent = dir ? `${dir}/* に範囲を限定する` : `(ルート)/* に範囲を限定する`;
}

// ── フラット化ユーティリティ ──
function flattenTree(nodes) {
  const out = [];
  function walk(n) {
    if (n.type === 'file') out.push(n);
    else if (n.children) n.children.forEach(walk);
  }
  nodes.forEach(walk);
  return out;
}

// ── フォーマット：秒 → m:ss ──
function fmtTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return `${m}:${ss.toString().padStart(2,'0')}`;
}

// ── シークバー更新 ──
audio.addEventListener('timeupdate', () => {
  if (muSeeking) return;
  const pct = audio.duration ? audio.currentWidth / audio.duration * 100 : 0;
  const p   = audio.duration ? audio.currentTime  / audio.duration * 100 : 0;
  document.getElementById('mu-seek-fill').style.width  = p + '%';
  document.getElementById('mu-seek-thumb').style.left  = p + '%';
  document.getElementById('mu-cur').textContent = fmtTime(audio.currentTime);
  document.getElementById('mu-dur').textContent = fmtTime(audio.duration);
});

// ── 再生終了 → 次の曲 ──
audio.addEventListener('ended', () => {
  const scoped = muScopedFiles();
  if (muMode === 'loop') {
    audio.currentTime = 0; audio.play();
  } else if (muMode === 'rand') {
    const si = Math.floor(Math.random() * scoped.length);
    muPlayIdx(muGlobalIdx(si));
  } else {
    const curSi = muScopedIdx(muIdx);
    const nextSi = curSi + 1;
    if (nextSi < scoped.length) muPlayIdx(muGlobalIdx(nextSi));
    else { muIdx = -1; muUpdateUI(); }
  }
});

// ── 曲を再生 ──
function muPlayIdx(idx) {
  if (idx < 0 || idx >= muFiles.length) return;
  muIdx = idx;
  const f = muFiles[idx];
  audio.src = f.url;
  audio.play().catch(() => {});
  muUpdateUI();
  muHighlight();
}

function muUpdateUI() {
  const f = muFiles[muIdx];
  const playing = !audio.paused;
  const playBtn = document.getElementById('mu-play');
  playBtn.querySelector('.mu-play-icon').style.display  = playing ? 'none' : '';
  playBtn.querySelector('.mu-pause-icon').style.display = playing ? '' : 'none';
  if (f) {
    const name = f.name.replace(/\.[^.]+$/, '');
    document.getElementById('mu-title').textContent  = name;
    document.getElementById('mu-artist').textContent = f.path.replace('/' + f.name, '') || '';
  }
  muUpdateScopeLabel();
}

function muHighlight() {
  document.querySelectorAll('.mu-file').forEach(el => {
    el.classList.toggle('active', el.dataset.idx === String(muIdx));
  });
}

// ── ツリーをDOMに描画 ──
function renderMuTree(nodes, container, depth) {
  nodes.forEach(node => {
    if (node.type === 'dir') {
      const div = document.createElement('div');
      div.className = 'mu-dir';
      const cnt = flattenTree([node]).length;
      div.innerHTML = `
        <div class="mu-dir-label">
          <span class="mu-dir-arrow">▶</span>
          <span>📁</span>
          <span class="mu-dir-name">${h(node.name)}</span>
          <span class="mu-dir-count">${cnt}</span>
        </div>
        <div class="mu-dir-children"></div>`;
      div.querySelector('.mu-dir-label').addEventListener('click', () => {
        div.classList.toggle('open');
      });
      // 深さ0はデフォルトで開く
      if (depth === 0) div.classList.add('open');
      renderMuTree(node.children, div.querySelector('.mu-dir-children'), depth + 1);
      container.appendChild(div);
    } else {
      const fileIdx = muFiles.findIndex(f => f.path === node.path);
      const div = document.createElement('div');
      div.className = 'mu-file';
      div.dataset.idx = fileIdx;
      div.innerHTML = `<span class="mu-file-name">${h(node.name.replace(/\.[^.]+$/, ''))}</span>`;
      let _pdX = 0, _pdY = 0;
      div.addEventListener('pointerdown', e => { _pdX = e.clientX; _pdY = e.clientY; });
      div.addEventListener('pointerup', e => {
        if (Math.hypot(e.clientX - _pdX, e.clientY - _pdY) < 8) muPlayIdx(fileIdx);
      });
      container.appendChild(div);
    }
  });
}

async function loadMusic() {
  const tree = document.getElementById('mu-tree');
  try {
    const data = await (await fetch('/api/music')).json();
    muFiles = flattenTree(data);
    document.getElementById('mu-tree-count').textContent = `${muFiles.length} 曲`;
    if (muFiles.length === 0) {
      tree.innerHTML = '<div class="loader" style="opacity:0.5">musicフォルダに音楽ファイルが見つかりません</div>';
      return;
    }
    tree.innerHTML = '';
    renderMuTree(data, tree, 0);
    muHighlight();
  } catch(e) {
    tree.innerHTML = `<div class="loader">読み込み失敗: ${h(e.message)}</div>`;
  }
}

// ── シークバー操作 ──
(function(){
  const sk = document.getElementById('mu-seek-track');
  function getPos(e) {
    const r = sk.getBoundingClientRect();
    return Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  }
  function applySeek(p) {
    if (audio.duration) audio.currentTime = p * audio.duration;
    document.getElementById('mu-seek-fill').style.width = (p*100) + '%';
    document.getElementById('mu-seek-thumb').style.left = (p*100) + '%';
  }
  sk.addEventListener('mousedown', e => {
    e.stopPropagation(); muSeeking = true; applySeek(getPos(e));
  });
  window.addEventListener('mousemove', e => { if (muSeeking) applySeek(getPos(e)); });
  window.addEventListener('mouseup',   () => { muSeeking = false; });
  sk.addEventListener('touchstart', e => {
    e.stopPropagation(); muSeeking = true; applySeek(getPos(e.touches[0]));
  }, { passive: true });
  sk.addEventListener('touchmove', e => {
    e.stopPropagation(); applySeek(getPos(e.touches[0]));
  }, { passive: true });
  sk.addEventListener('touchend', e => { e.stopPropagation(); muSeeking = false; });
})();

// ── 音量バー操作 ──
function muSetVolume(v) {
  v = Math.max(0, Math.min(1, v));
  audio.volume = v;
  document.getElementById('mu-vol-fill').style.width  = (v*100) + '%';
  document.getElementById('mu-vol-thumb').style.left  = (v*100) + '%';
}
(function(){
  const vt = document.getElementById('mu-vol-track');
  audio.volume = 0.8; muSetVolume(0.8);
  function getPos(e) {
    const r = vt.getBoundingClientRect();
    return Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  }
  let vd = false;
  vt.addEventListener('mousedown', e => { e.stopPropagation(); vd = true; muSetVolume(getPos(e)); });
  window.addEventListener('mousemove', e => { if (vd) muSetVolume(getPos(e)); });
  window.addEventListener('mouseup',   () => { vd = false; });
  vt.addEventListener('touchstart', e => { e.stopPropagation(); vd = true; muSetVolume(getPos(e.touches[0])); }, { passive: true });
  vt.addEventListener('touchmove',  e => { e.stopPropagation(); muSetVolume(getPos(e.touches[0])); }, { passive: true });
  vt.addEventListener('touchend',   () => { vd = false; });
  // +/- ボタン
  document.getElementById('mu-vol-up').addEventListener('click',   () => muSetVolume(audio.volume + 0.1));
  document.getElementById('mu-vol-down').addEventListener('click', () => muSetVolume(audio.volume - 0.1));
})();

// ── 再生/一時停止ボタン ──
document.getElementById('mu-play').addEventListener('click', () => {
  if (muIdx < 0 && muFiles.length > 0) { muPlayIdx(0); return; }
  if (audio.paused) audio.play().catch(()=>{});
  else audio.pause();
  muUpdateUI();
});

// ── 前/次ボタン ──
document.getElementById('mu-prev').addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const scoped = muScopedFiles();
  if (muMode === 'rand') {
    muPlayIdx(muGlobalIdx(Math.floor(Math.random() * scoped.length)));
  } else {
    const curSi = muScopedIdx(muIdx);
    muPlayIdx(muGlobalIdx(Math.max(0, curSi - 1)));
  }
});
document.getElementById('mu-next').addEventListener('click', () => {
  const scoped = muScopedFiles();
  if (muMode === 'rand') {
    muPlayIdx(muGlobalIdx(Math.floor(Math.random() * scoped.length)));
  } else {
    const curSi = muScopedIdx(muIdx);
    muPlayIdx(muGlobalIdx(Math.min(scoped.length - 1, curSi + 1)));
  }
});

// ── モードボタン ──
['seq','rand','loop'].forEach(mode => {
  document.getElementById(`mu-mode-${mode}`).addEventListener('click', () => {
    muMode = mode;
    document.querySelectorAll('.mu-mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`mu-mode-${mode}`).classList.add('active');
  });
});

// ── スコープチェックボックス ──
document.getElementById('mu-scope-chk').addEventListener('change', muUpdateScopeLabel);

// 再生状態が変わるたびにUIを同期
audio.addEventListener('play',  muUpdateUI);
audio.addEventListener('pause', muUpdateUI);

let cmdLocked = false; // 3秒間のロック状態

async function loadCommands() {
  const list = document.getElementById('cmd-list');
  const cntEl = document.getElementById('cmd-handle-count');
  try {
    const cmds = await (await fetch('/api/commands')).json();
    if (cntEl) cntEl.textContent = `${cmds.length} 件が登録されています`;
    if (!cmds.length) {
      list.innerHTML = '<div class="loader" style="opacity:0.5">commands.json が見つからないか空です</div>';
      return;
    }
    list.innerHTML = '';
    cmds.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'cmd-btn';
      btn.innerHTML = `<span class="cmd-btn-name">${h(item.name || '無名')}</span>`;

      let pdX = 0, pdY = 0;
      btn.addEventListener('pointerdown', e => { pdX = e.clientX; pdY = e.clientY; });
      btn.addEventListener('pointerup', e => {
        const dist = Math.hypot(e.clientX - pdX, e.clientY - pdY);
        if (dist < 8) runCommand(item);
      });

      list.appendChild(btn);
    });
  } catch(e) {
    if (cntEl) cntEl.textContent = '読み込み失敗';
    list.innerHTML = `<div class="loader">読み込み失敗: ${h(e.message)}</div>`;
  }
}

async function runCommand(item) {
  if (cmdLocked) return;

  cmdLocked = true;
  const allBtns = document.querySelectorAll('.cmd-btn');
  allBtns.forEach(b => b.disabled = true);

  const status = document.getElementById('cmd-status');
  status.textContent = `▶ 実行中: ${item.name}`;
  status.className = '';

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cmd: item.cmd }),
    });
    const data = await res.json();
    if (data.ok) {
      status.textContent = `✓ 完了: ${item.name}`;
      status.className = 'ok';
    } else {
      status.textContent = `✗ エラー: ${data.error || '不明'}`;
      status.className = 'fail';
    }
  } catch(e) {
    status.textContent = `✗ 通信エラー: ${e.message}`;
    status.className = 'fail';
  }

  setTimeout(() => {
    cmdLocked = false;
    allBtns.forEach(b => b.disabled = false);

    setTimeout(() => {
      if (status.textContent.startsWith('✓') || status.textContent.startsWith('✗')) {
        status.textContent = '';
        status.className = '';
      }
    }, 2000);
  }, 3000);
}

loadMusic();
loadCommands();

loadWeather();
loadNews();
loadForex();
setInterval(loadWeather,  30*60*1000);
setInterval(loadNews,     10*60*1000);
setInterval(loadForex,    60*60*1000);
setTimeout(() => location.reload(), 6*60*60*1000);

</script>
